<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>共有メモ一覧 - Zero Notes</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
</head>
<body>
  <header class="site-header">
    <div>
      <p class="label">ZERO NOTES</p>
      <h1>共有メモ一覧</h1>
      <p class="lead">自分が共有したクイックメモを管理できます。</p>
    </div>

    <div class="auth-area">
      <a href="index.html" class="back-link">一覧へ戻る</a>
      <button id="loginBtn">ログイン</button>
      <button id="logoutBtn" class="hidden">ログアウト</button>
      <p id="userInfo" class="user-info">未ログイン</p>
    </div>
  </header>

  <main class="container">
    <section class="shared-list-panel">
      <div class="panel-head">
        <div>
          <h2>共有中のメモ</h2>
          <p id="sharedStatus" class="empty-text">ログインすると共有メモを表示します。</p>
        </div>
        <button id="reloadSharedBtn" class="small-btn">↻</button>
      </div>

      <div id="sharedMemoList" class="shared-memo-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Created by Lane / Presented by ゆるおり</p>
  </footer>

  <script type="module" src="shared.js"></script>
</body>
</html>
